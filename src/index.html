<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Notes</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <!-- Title bar for dragging -->
      <div class="title-bar" data-tauri-drag-region>
        <span class="app-title">Quick Notes</span>
        <div class="window-controls">
          <button id="minimize-btn" class="window-btn" title="Minimize">−</button>
          <button id="close-btn" class="window-btn" title="Close (hide to tray)">×</button>
        </div>
      </div>
      
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <button id="new-note-btn" class="btn" title="New Note">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="12" y1="18" x2="12" y2="12"></line>
              <line x1="9" y1="15" x2="15" y2="15"></line>
            </svg>
            New
          </button>
          <button id="save-btn" class="btn btn-primary" title="Save (Ctrl+S)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            Save
          </button>
        </div>
        <div class="toolbar-right">
          <button id="preview-toggle" class="btn" title="Toggle Preview">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            Preview
          </button>
          <button id="always-on-top-btn" class="btn active" title="Always on Top">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 14 10 14 10 20"></polyline>
              <polyline points="20 10 14 10 14 4"></polyline>
              <line x1="14" y1="10" x2="21" y2="3"></line>
              <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
            Pin
          </button>
        </div>
      </div>
      
      <!-- Main content area -->
      <div class="content">
        <!-- Editor -->
        <div id="editor-container" class="panel">
          <textarea id="editor" placeholder="Type your note here... (Markdown supported)"></textarea>
        </div>
        
        <!-- Preview -->
        <div id="preview-container" class="panel hidden">
          <div id="preview"></div>
        </div>
      </div>
      
      <!-- Status bar -->
      <div class="status-bar">
        <span id="status-text">Ready</span>
        <span id="word-count">0 words</span>
      </div>
    </div>
  </body>
</html>
