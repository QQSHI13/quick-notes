name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build
        env:
          CI: true

      - name: List bundle directory
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/release/bundle) {
            Get-ChildItem -Path src-tauri/target/release/bundle -Recurse
          } else {
            Write-Host "Bundle directory not found"
            Get-ChildItem -Path src-tauri/target/release -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue
            Get-ChildItem -Path src-tauri/target/release -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-notes-windows
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
          if-no-files-found: warn
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            pkg-config \
            patchelf \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build
        env:
          CI: true

      - name: List bundle directory
        run: |
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "Bundle dir not found"
          find src-tauri/target/release -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" 2>/dev/null | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-notes-linux
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.tar.gz
          if-no-files-found: warn
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build -- --target universal-apple-darwin
        env:
          CI: true

      - name: List bundle directory
        run: |
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "Bundle dir not found"
          find src-tauri/target/release -name "*.dmg" -o -name "*.app" 2>/dev/null | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-notes-macos
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.tar.gz
          if-no-files-found: warn
          retention-days: 7

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f 2>/dev/null | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
