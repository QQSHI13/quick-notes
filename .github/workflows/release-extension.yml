name: Build and Release Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.3.0) - leave blank for auto-detect'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Detect Version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            [xml]$manifest = Get-Content QuickNotes/Package.appxmanifest
            $version = $manifest.Package.Identity.Version
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Build MSIX Bundle
        shell: pwsh
        run: |
          dotnet build QuickNotes.sln -c Release -p:GenerateAppxPackageOnBuild=true -p:AppxBundle=Always -p:AppxBundlePlatforms="x64|arm64"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: QuickNotes-v${{ steps.version.outputs.version }}
          name: Quick Notes Extension v${{ steps.version.outputs.version }}
          files: |
            QuickNotes/AppPackages/**/*.msixbundle
          body: |
            ## Quick Notes Extension v${{ steps.version.outputs.version }}
            
            A Windows Command Palette extension for quick note-taking.
            
            ### Installation
            1. Download the MSIX bundle
            2. Double-click to install
            3. Open PowerToys Command Palette (Win + Alt + Space)
            4. Type "Quick Notes" to use the extension
            
            ### Features
            - Create timestamped markdown notes
            - Browse and open existing notes
            - Sync note titles with filenames
            - Configurable notes directory
            
            ### Requirements
            - Windows 10/11 (Build 19041+)
            - PowerToys with Command Palette enabled
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
