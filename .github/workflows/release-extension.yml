name: Build and Release Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.3.0) - leave blank for auto-detect'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Detect Version
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if (-not $inputVersion) {
            [xml]$manifest = Get-Content QuickNotes/Package.appxmanifest
            $version = $manifest.Package.Identity.Version
          } else {
            $version = $inputVersion
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Detected Version: $version"

      - name: Create Self-Signed Certificate
        id: create_cert
        shell: pwsh
        run: |
          # The CN must match the 'Publisher' attribute in your Package.appxmanifest
          $cert = New-SelfSignedCertificate -Type Custom `
            -Subject "CN=QuickNotesDev" `
            -KeyUsage DigitalSignature `
            -FriendlyName "QuickNotes Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          
          $password = ConvertTo-SecureString "Password123" -AsPlainText -Force
          Export-PfxCertificate -Cert $cert -FilePath "cert.pfx" -Password $password
          Write-Host "Certificate created and exported to cert.pfx"

      - name: Build MSIX Bundle
        shell: pwsh
        run: |
          dotnet build QuickNotes.sln -c Release `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxBundle=Always `
            -p:AppxBundlePlatforms="x64|arm64" `
            -p:UapAppxPackageBuildMode=Sideloading

      - name: Sign MSIX Bundle
        shell: pwsh
        run: |
          # Find the bundle - using a broad search to ensure it's caught
          $bundle = Get-ChildItem -Path "**/AppPackages/**/*.msixbundle" | Select-Object -First 1
          if (-not $bundle) { throw "MSIX Bundle not found!" }
          
          # Locating signtool.exe (usually in Windows SDK paths on the runner)
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          & $signtool sign /fd SHA256 /a /f cert.pfx /p Password123 $bundle.FullName
          Write-Host "Successfully signed $($bundle.Name)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Quick Notes Extension v${{ steps.version.outputs.version }}
          files: |
            **/AppPackages/**/*.msixbundle
          body: |
            ## Quick Notes Extension v${{ steps.version.outputs.version }}

            A Windows Command Palette extension for quick note-taking.

            ### Installation
            1. Download the MSIX bundle.
            2. **Important:** Since this is self-signed, you must right-click the bundle -> Properties -> Digital Signatures -> View Certificate -> Install Certificate (Local Machine -> Trusted People).
            3. Double-click to install.

            ### Features
            - Create timestamped markdown notes
            - Browse and open existing notes
            - Sync note titles with filenames
            - Configurable notes directory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
