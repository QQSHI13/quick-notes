name: Build and Release Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.3.0) - leave blank for auto-detect'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Detect Version
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if (-not $inputVersion) {
            [xml]$manifest = Get-Content QuickNotes/Package.appxmanifest
            $version = $manifest.Package.Identity.Version
          } else {
            $version = $inputVersion
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Write-Host "Detected Version: $version"

      - name: Build MSIX Bundle
        shell: pwsh
        run: |
          dotnet build QuickNotes.sln -c Release `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxBundle=Always `
            -p:AppxBundlePlatforms="x64|arm64"

      - name: Find MSIX Bundle
        id: find_bundle
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path "QuickNotes/AppPackages" -Filter "*.msixbundle" -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($bundle) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "bundle_path=$($bundle.FullName)"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "bundle_name=$($bundle.Name)"
            Write-Host "Found bundle: $($bundle.FullName)"
          } else {
            Write-Host "No bundle found"
            exit 1
          }

      - name: Create Self-Signed Certificate
        id: create_cert
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          Write-Host "Working in workspace: $workspace"
          
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=QQSHI13" `
            -KeyUsage DigitalSignature `
            -FriendlyName "QuickNotes Signing Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          
          $thumbprint = $cert.Thumbprint
          $password = ConvertTo-SecureString "TempCert123!" -AsPlainText -Force
          
          $certPfxPath = Join-Path $workspace "signing-cert.pfx"
          $certCerPath = Join-Path $workspace "signing-cert.cer"
          
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$thumbprint" -FilePath $certPfxPath -Password $password
          Export-Certificate -Cert "Cert:\CurrentUser\My\$thumbprint" -FilePath $certCerPath
          
          Write-Host "Certificate created with thumbprint: $thumbprint"
          Write-Host "PFX: $certPfxPath"
          Write-Host "CER: $certCerPath"
          
          Add-Content -Path $env:GITHUB_OUTPUT -Value "cert_pfx=$certPfxPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "cert_cer=$certCerPath"
          
          # List files to verify they exist
          Write-Host "Files in workspace:"
          Get-ChildItem $workspace | Select-Object Name

      - name: Sign MSIX Bundle
        id: sign_bundle
        shell: pwsh
        run: |
          $bundlePath = "${{ steps.find_bundle.outputs.bundle_path }}"
          $certPath = "${{ steps.create_cert.outputs.cert_pfx }}"
          
          Write-Host "Bundle path: $bundlePath"
          Write-Host "Cert path: $certPath"
          
          # Verify files exist
          if (-not (Test-Path $bundlePath)) {
            Write-Host "❌ Bundle not found: $bundlePath"
            exit 1
          }
          if (-not (Test-Path $certPath)) {
            Write-Host "❌ Cert not found: $certPath"
            exit 1
          }
          
          # Find signtool - use the one from Windows SDK that's guaranteed to be there
          $signtool = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          
          if (-not (Test-Path $signtool)) {
            # Try to find ANY signtool
            $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          
          if (-not $signtool) {
            Write-Host "❌ signtool.exe not found!"
            exit 1
          }
          
          Write-Host "Using signtool: $signtool"
          
          # Sign the bundle - VERBOSE output
          & $signtool sign `
            /v `
            /fd SHA256 `
            /f $certPath `
            /p "TempCert123!" `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            $bundlePath
          
          $signResult = $LASTEXITCODE
          Write-Host "Signtool exit code: $signResult"
          
          if ($signResult -ne 0) {
            Write-Host "❌ Signing failed!"
            exit 1
          }
          
          # Verify the signature
          Write-Host "`nVerifying signature..."
          & $signtool verify /pa /v $bundlePath
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Signature verification failed!"
            exit 1
          }
          
          Write-Host "✅ Bundle signed and verified successfully!"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickNotes-v${{ steps.version.outputs.version }}
          path: |
            ${{ steps.find_bundle.outputs.bundle_path }}
            ${{ steps.create_cert.outputs.cert_pfx }}
            ${{ steps.create_cert.outputs.cert_cer }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Quick Notes Extension v${{ steps.version.outputs.version }}
          files: |
            ${{ steps.find_bundle.outputs.bundle_path }}
            ${{ steps.create_cert.outputs.cert_pfx }}
            ${{ steps.create_cert.outputs.cert_cer }}
          body: |
            ## Quick Notes Extension v${{ steps.version.outputs.version }}

            A Windows Command Palette extension for quick note-taking.

            ### Installation Options

            **Option 1: Microsoft Store (Recommended)**
            - Fully trusted, automatic updates, no warnings
            - [Get it on Microsoft Store](https://apps.microsoft.com/store/detail/9P8M54K17J8L?cid=DevShareMCLPCS)

            **Option 2: GitHub Release (This Download)**
            - ⚠️ Self-signed certificate - follow the steps below

            #### Installing the Self-Signed Version

            Since this release is signed with a self-signed certificate, Windows will show a security warning. To install:

            1. **Download** the `.msixbundle` file
            2. **Right-click** the file → **Properties** → **Digital Signatures** tab
            3. Select the signature → Click **Details** → Click **View Certificate**
            4. Click **Install Certificate** → Select **Local Machine** → Click Next
            5. Select **Place all certificates in the following store** → Click **Browse**
            6. Select **Trusted People** → Click OK → Click Next → Click Finish
            7. Close all dialogs and **double-click the .msixbundle** to install

            ### Features
            - Create timestamped markdown notes
            - Browse and open existing notes
            - Sync note titles with filenames
            - Configurable notes directory

            ### System Requirements
            - Windows 10/11 (Build 19041+)
            - PowerToys with Command Palette enabled
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
