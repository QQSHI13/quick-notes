name: Update WinGet Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., 0.3.0)'
        required: true
        type: string

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Release Info
        id: release
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = '${{ github.event.release.tag_name }}' -replace 'QuickNotes-v', ''
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Update WinGet
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: QQSHI13.QuickNotesExtension
          version: ${{ steps.release.outputs.version }}
          installers: |
            https://github.com/QQSHI13/quick-notes/releases/download/QuickNotes-v${{ steps.release.outputs.version }}/QuickNotes-Setup-${{ steps.release.outputs.version }}-x64.exe
            https://github.com/QQSHI13/quick-notes/releases/download/QuickNotes-v${{ steps.release.outputs.version }}/QuickNotes-Setup-${{ steps.release.outputs.version }}-arm64.exe
          token: ${{ secrets.WINGET_TOKEN }}
